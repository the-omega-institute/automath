name: Release / Validate main.pdf

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or SHA to validate against main-gate.
        required: false
        default: main
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: release-main-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check out target ref for validation
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Resolve release target
        id: resolve_target
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "target_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            echo "release_tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "publish_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release target points to main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${{ steps.resolve_target.outputs.target_sha }}" origin/main

      - name: Find successful main gate run for this commit
        id: find_main_gate
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          TARGET_SHA: ${{ steps.resolve_target.outputs.target_sha }}
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: ".github/workflows/main-gate.yml",
              branch: "main",
              event: "push",
              status: "completed",
              head_sha: process.env.TARGET_SHA,
              per_page: 100,
            });

            const run = runs.find((item) => item.conclusion === "success");
            if (!run) {
              core.setFailed(
                `No successful Main Gate run was found for ${process.env.TARGET_SHA}. Wait for main-gate to succeed before publishing a release.`
              );
              return;
            }

            core.info(`Using Main Gate run ${run.id} for ${process.env.TARGET_SHA}.`);
            core.setOutput("run_id", String(run.id));

      - name: Download main.pdf artifact from main gate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: main-pdf
          path: release-assets
          repository: ${{ github.repository }}
          run-id: ${{ steps.find_main_gate.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release asset
        id: resolve-asset
        run: |
          pdf_path="$(find release-assets -maxdepth 1 -type f -name 'main_*.pdf' -print -quit)"
          if [ -z "$pdf_path" ]; then
            echo "Expected a dated PDF artifact in release-assets" >&2
            exit 1
          fi

          echo "pdf_path=$pdf_path" >> "$GITHUB_OUTPUT"

      - name: Write validation summary
        run: |
          {
            echo "Validated release prerequisites."
            echo
            echo "- target SHA: \`${{ steps.resolve_target.outputs.target_sha }}\`"
            echo "- main-gate run: \`${{ steps.find_main_gate.outputs.run_id }}\`"
            echo "- PDF asset: \`${{ steps.resolve-asset.outputs.pdf_path }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish release
        if: ${{ steps.resolve_target.outputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.resolve_target.outputs.release_tag }}
          name: ${{ steps.resolve_target.outputs.release_tag }}
          files: ${{ steps.resolve-asset.outputs.pdf_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
