name: Reusable Lean4 Build

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Branch, tag, or SHA to check out before building.
        required: false
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-lean4:
    name: Build Lean4
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}
          fetch-depth: 0

      - name: Restore Lean olean cache
        uses: actions/cache/restore@v4
        with:
          path: lean4/.lake/build
          key: lean4-olean-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            lean4-olean-${{ runner.os }}-

      - name: Build Lean4 project
        uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e # v1
        with:
          lake-package-directory: lean4
          build: true
          use-mathlib-cache: true
          use-github-cache: "false"

      - name: Audit Lean sources
        run: python3 lean4/scripts/omega_ci.py audit

      - name: Build Lean inventory
        run: python3 lean4/scripts/omega_ci.py inventory --strict --json "${RUNNER_TEMP}/omega-lean-inventory.json"

      - name: Build paper coverage report
        run: python3 lean4/scripts/omega_ci.py paper-coverage --sections body --json "${RUNNER_TEMP}/omega-paper-coverage.json"

      - name: Save Lean olean cache (dev only)
        if: success() && github.ref == 'refs/heads/dev'
        uses: actions/cache/save@v4
        with:
          path: lean4/.lake/build
          key: lean4-olean-${{ runner.os }}-${{ github.sha }}

