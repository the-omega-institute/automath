name: PDF CI

on:
  pull_request:
    paths:
      - .github/workflows/main-pdf-ci.yml
      - .github/workflows/reusable-pdf.yml
      - .github/workflows/main-gate.yml
      - .github/workflows/main-pdf-release.yml
      - theory/2026_golden_ratio_driven_scan_projection_generation_recursive_emergence/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pdf-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pdf:
    uses: ./.github/workflows/reusable-pdf.yml
    secrets: inherit
