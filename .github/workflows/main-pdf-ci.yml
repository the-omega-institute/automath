name: Build main.pdf CI

on:
  pull_request:
    paths:
      - .github/workflows/build-main-pdf.yml
      - .github/workflows/main-pdf-ci.yml
      - .github/workflows/main-pdf-release.yml
      - theory/2026_golden_ratio_driven_scan_projection_generation_recursive_emergence/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-main-pdf.yml
      - .github/workflows/main-pdf-ci.yml
      - .github/workflows/main-pdf-release.yml
      - theory/2026_golden_ratio_driven_scan_projection_generation_recursive_emergence/**
  workflow_dispatch:

concurrency:
  group: main-pdf-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-main-pdf:
    uses: ./.github/workflows/build-main-pdf.yml
