name: Deploy Discovery Dossier

on:
  push:
    branches: [dev]
    paths: ['docs/dossier/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.40"

      - name: Render dossier
        run: quarto render docs/dossier/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dossier/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
