name: Lean4 CI

on:
  pull_request:
    paths:
      - .github/workflows/lean4-ci.yml
      - .github/workflows/reusable-lean4.yml
      - .github/workflows/main-gate.yml
      - .github/workflows/main-pdf-release.yml
      - lean4/**
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: lean4-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean4:
    uses: ./.github/workflows/reusable-lean4.yml
    secrets: inherit
