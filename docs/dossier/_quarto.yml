project:
  type: website
  output-dir: _site

website:
  title: "Derive, Discover, Name"
  navbar:
    left:
      - text: "The Discovery"
        href: index.qmd
      - text: "Invisible Assumptions"
        href: invisible-assumptions.qmd
    right:
      - icon: github
        href: https://github.com/the-omega-institute/automath
      - text: "中文"
        menu:
          - text: "发现故事"
            href: index.zh-CN.qmd
          - text: "隐形假设"
            href: invisible-assumptions.zh-CN.qmd
  open-graph:
    image: og-image.png
    description: "What happens when you give AI a single equation and say 'derive everything'? The Omega Project is a case study in AI-assisted mathematical discovery."
  twitter-card:
    image: og-image.png
    card-style: summary_large_image

format:
  html:
    theme: cosmo
    css: assets/omega-dossier.css
    toc: true
    toc-depth: 3
    code-fold: true
    filters:
      - _extensions/evidence.lua
    include-after-body:
      text: |
        <script data-goatcounter="https://omega-dossier.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
